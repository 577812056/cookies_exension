<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Maker</title>
    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --primary-light: #eef2ff;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --success-bg: #f0fdf4;
        --success-text: #16a34a;
        --success-border: #bbf7d0;
        --error-bg: #fef2f2;
        --error-text: #dc2626;
        --error-border: #fecaca;
        --warn-bg: #fffbeb;
        --warn-text: #d97706;
        --warn-border: #fde68a;
        --border: #e5e7eb;
        --bg: #f9fafb;
        --surface: #ffffff;
        --text: #111827;
        --text-muted: #6b7280;
        --radius: 8px;
        --radius-sm: 5px;
        --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 440px;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: var(--text);
      }

      /* ── Header ── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-icon {
        width: 28px; height: 28px;
        background: var(--primary);
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .header-icon svg { width: 16px; height: 16px; fill: #fff; }
      .header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
      .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

      /* ── Toast ── */
      #toast {
        position: fixed;
        top: 56px; left: 50%;
        transform: translateX(-50%) translateY(-8px);
        background: var(--text);
        color: #fff;
        padding: 8px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s, transform .2s;
        z-index: 999;
        max-width: 360px;
        text-align: center;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #toast.success { background: var(--success-text); }
      #toast.error   { background: var(--danger); }
      #toast.warn    { background: var(--warn-text); }

      /* ── Main content ── */
      .content { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card-header {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: .5px;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

      /* ── Form elements ── */
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      input[type='text'],
      select,
      textarea {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 13px;
        color: var(--text);
        background: var(--surface);
        outline: none;
        transition: border-color .15s, box-shadow .15s;
      }
      input[type='text']:focus,
      select:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      }
      textarea {
        min-height: 130px;
        resize: vertical;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 13px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background .15s, transform .1s;
        white-space: nowrap;
      }
      .btn:active { transform: scale(.97); }
      .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

      .btn-primary { background: var(--primary); color: #fff; }
      .btn-primary:hover { background: var(--primary-hover); }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { background: var(--bg); color: var(--text); }

      .btn-danger { background: var(--danger); color: #fff; }
      .btn-danger:hover { background: var(--danger-hover); }

      .btn-sm { padding: 4px 9px; font-size: 11px; }

      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* ── View switcher ── */
      .view-tabs {
        display: flex;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 2px;
        gap: 2px;
      }
      .view-tab {
        flex: 1;
        padding: 5px 8px;
        border: none;
        border-radius: 4px;
        background: transparent;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: background .15s, color .15s;
      }
      .view-tab.active {
        background: var(--surface);
        color: var(--primary);
        box-shadow: 0 1px 3px rgba(0,0,0,.1);
      }

      /* ── Table ── */
      .table-wrap {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        max-height: 200px;
        overflow: auto;
        display: none;
      }
      .table-wrap.active { display: block; }

      table.cookie-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      table.cookie-table th {
        background: var(--bg);
        padding: 7px 8px;
        text-align: left;
        font-weight: 600;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        white-space: nowrap;
      }
      table.cookie-table td {
        padding: 6px 8px;
        border-bottom: 1px solid #f3f4f6;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      table.cookie-table tr:last-child td { border-bottom: none; }
      table.cookie-table tr:hover td { background: var(--primary-light); }
      .truncate { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

      /* ── Copy row ── */
      .copy-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .copy-row select { flex: 1; }

      /* ── Saved list ── */
      .saved-list {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        max-height: 140px;
        overflow-y: auto;
      }
      .saved-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid #f3f4f6;
        transition: background .12s;
      }
      .saved-item:last-child { border-bottom: none; }
      .saved-item:hover { background: var(--bg); }
      .saved-item-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        margin-right: 8px;
      }
      .saved-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

      .empty-state {
        padding: 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
      }

      /* ── Helper text ── */
      .helper { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

      /* ── Badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
        background: var(--primary-light);
        color: var(--primary);
      }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div>
        <h1>Cookie Maker</h1>
        <div class="header-sub">跨标签页 Cookie 提取 &amp; 注入</div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <div class="content">

      <!-- URL 区域 -->
      <div class="card">
        <div class="card-header">页面 URL</div>
        <div class="card-body">
          <div>
            <label for="current-url">当前页面</label>
            <input type="text" id="current-url" placeholder="https://example.com" />
          </div>
          <div>
            <label for="target-url">目标 URL</label>
            <input type="text" id="target-url" placeholder="https://example.com" />
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="extract-cookies">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              提取 Cookie
            </button>
            <button class="btn btn-ghost" id="load-url">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
              加载当前标签
            </button>
          </div>
        </div>
      </div>

      <!-- Cookie 数据 -->
      <div class="card">
        <div class="card-header">
          <span>Cookie 数据</span>
          <span class="badge" id="cookie-count">0</span>
        </div>
        <div class="card-body">
          <div class="view-tabs">
            <button class="view-tab" id="json-view-btn">JSON 视图</button>
            <button class="view-tab active" id="table-view-btn">表格视图</button>
          </div>

          <textarea id="cookies-json" placeholder="[]" style="display:none"></textarea>

          <div id="cookies-table-container" class="table-wrap active">
            <table id="cookies-table" class="cookie-table">
              <thead>
                <tr>
                  <th><input type="checkbox" id="select-all-cookies" title="全选/取消全选" /></th>
                  <th>名称</th>
                  <th>值</th>
                  <th>域名</th>
                  <th>路径</th>
                  <th>过期</th>
                  <th>Secure</th>
                  <th>HttpOnly</th>
                </tr>
              </thead>
              <tbody id="cookies-table-body"></tbody>
            </table>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" id="inject-cookies">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 15v4H5v-4H3v4c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-4h-2zM7 9l1.41 1.41L11 7.83V16h2V7.83l2.59 2.58L17 9l-5-5-5 5z"/></svg>
              注入到目标 URL
            </button>
            <button class="btn btn-ghost" id="format-json">格式化 JSON</button>
          </div>

          <!-- 复制 -->
          <div>
            <label>复制 Cookie</label>
            <div class="copy-row">
              <select id="copy-format">
                <option value="json">JSON 格式 {"key":"value"}</option>
                <option value="text">文本格式 key=value;</option>
              </select>
              <button class="btn btn-primary" id="copy-cookies">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                复制
              </button>
            </div>
            <div class="helper">JSON: {"key":"value"} &nbsp;|&nbsp; 文本: key=value;key2=value2;</div>
          </div>
        </div>
      </div>

      <!-- 浏览器存储 -->
      <div class="card">
        <div class="card-header">
          <span>浏览器存储</span>
          <span class="badge" id="storage-count">0</span>
        </div>
        <div class="card-body">
          <div class="btn-row">
            <button class="btn btn-primary" id="copy-localstorage">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.48 0 12.36 0c-1.7 0-3.21.74-4.27 1.9L7 3 5.91 1.9C4.85.74 3.34 0 1.64 0 .74 0 0 .74 0 1.64c0 .9.74 1.64 1.64 1.64.48 0 .9-.2 1.22-.52L4 3.59C3.38 4.51 3 5.61 3 6.82V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-9 13H5v-2h6v2zm0-4H5v-2h6v2zm0-4H5V9h6v2zm8 8h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V9h6v2z"/></svg>
              复制 LocalStorage
            </button>
            <button class="btn btn-ghost" id="copy-sessionstorage">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.48 0 12.36 0c-1.7 0-3.21.74-4.27 1.9L7 3 5.91 1.9C4.85.74 3.34 0 1.64 0 .74 0 0 .74 0 1.64c0 .9.74 1.64 1.64 1.64.48 0 .9-.2 1.22-.52L4 3.59C3.38 4.51 3 5.61 3 6.82V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-9 13H5v-2h6v2zm0-4H5v-2h6v2zm0-4H5V9h6v2zm8 8h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V9h6v2z"/></svg>
              复制 SessionStorage
            </button>
          </div>
          <div id="storage-preview" class="table-wrap" style="display:none; max-height:160px;">
            <table class="cookie-table">
              <thead>
                <tr><th>Key</th><th>Value</th></tr>
              </thead>
              <tbody id="storage-table-body"></tbody>
            </table>
          </div>
          <div class="helper" id="storage-helper">点击按钮读取当前标签页的存储数据并复制到剪贴板</div>
        </div>
      </div>

      <!-- 保存 / 加载 -->
      <div class="card">
        <div class="card-header">Cookie 集管理</div>
        <div class="card-body">
          <div>
            <label for="cookie-set-name">集合名称</label>
            <input type="text" id="cookie-set-name" placeholder="输入名称以保存或加载" />
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="save-cookies">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
              保存
            </button>
            <button class="btn btn-ghost" id="load-saved-cookies">加载</button>
          </div>

          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <label style="margin:0">已保存的集合</label>
              <button class="btn btn-ghost btn-sm" id="refresh-saved-cookies">刷新</button>
            </div>
            <div id="saved-cookies-list" class="saved-list"></div>
          </div>
        </div>
      </div>

    </div><!-- /content -->

    <script src="popup.js"></script>
  </body>
</html>
