<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Maker</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 20px;
      color: #202124;
    }
    .input-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #202124;
    }
    input[type="text"], select, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: monospace;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background-color: #3367d6;
    }
    button.secondary {
      background-color: #f1f3f4;
      color: #202124;
    }
    button.secondary:hover {
      background-color: #e8eaed;
    }
    .cookies-display {
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      background-color: #f8f9fa;
      font-size: 13px;
      font-family: monospace;
    }
    .cookie-item {
      padding: 5px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .cookie-item:last-child {
      border-bottom: none;
    }
    .cookie-name {
      font-weight: 500;
    }
    .message {
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      background-color: #e8f5e8;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }
    .message.error {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
      display: block;
    }
    .saved-cookies {
      margin-top: 20px;
    }
    .saved-cookies-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .saved-cookies-list {
      border: 1px solid #dadce0;
      border-radius: 4px;
      max-height: 150px;
      overflow-y: auto;
    }
    .saved-cookie-item {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
    }
    .saved-cookie-item:last-child {
      border-bottom: none;
    }
    
    .saved-cookie-actions {
      display: flex;
      gap: 8px;
    }
    
    .saved-cookie-actions button {
      padding: 4px 8px;
      font-size: 12px;
    }
    
    .saved-cookie-actions .delete {
      background-color: #ff4444;
      color: white;
      border: none;
    }
    
    .saved-cookie-actions .delete:hover {
      background-color: #cc0000;
    }
    
    /* 表格视图样式 */
    .view-switcher {
      margin-bottom: 10px;
      display: flex;
      gap: 5px;
    }
    .view-switcher button {
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }
    .view-switcher button.active {
      background-color: #4285f4;
      color: white;
    }
    
    .table-container {
      border: 1px solid #dadce0;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    .table-container.active {
      display: block;
    }
    
    table.cookie-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.cookie-table th {
      background-color: #f8f9fa;
      padding: 8px;
      text-align: left;
      font-weight: 500;
      border-bottom: 2px solid #dadce0;
      position: sticky;
      top: 0;
    }
    table.cookie-table td {
      padding: 8px;
      border-bottom: 1px solid #e0e0e0;
      word-break: break-all;
    }
    table.cookie-table tr:hover {
      background-color: #f8f9fa;
    }
    .truncate {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: help;
    }
  </style>
</head>
<body>
  <h1>Cookie Maker</h1>
  
  <!-- 当前URL和Cookie操作 -->
  <div class="input-group">
    <label for="current-url">当前页面URL</label>
    <input type="text" id="current-url" placeholder="https://example.com">
  </div>
  
  <div class="button-group">
    <button id="extract-cookies">提取当前页面Cookie</button>
    <button id="load-url">加载当前标签URL</button>
  </div>
  
  <!-- 目标URL输入 -->
  <div class="input-group">
    <label for="target-url">目标URL</label>
    <input type="text" id="target-url" placeholder="https://example.com">
  </div>
  
  <!-- Cookie展示区域 -->
  <div class="input-group">
    <label>Cookie数据</label>
    <div class="view-switcher">
      <button id="json-view-btn" class="secondary active">JSON视图</button>
      <button id="table-view-btn" class="secondary">表格视图</button>
    </div>
    <textarea id="cookies-json" placeholder="{}"></textarea>
    <div id="cookies-table-container" class="table-container">
      <table id="cookies-table" class="cookie-table">
        <thead>
          <tr>
            <th>名称</th>
            <th>值</th>
            <th>域名</th>
            <th>路径</th>
            <th>过期时间</th>
            <th>安全</th>
            <th>HttpOnly</th>
          </tr>
        </thead>
        <tbody id="cookies-table-body">
          <!-- 表格内容将通过JavaScript动态生成 -->
        </tbody>
      </table>
    </div>
  </div>
  
  <div class="button-group">
    <button id="inject-cookies">向目标URL注入Cookie</button>
    <button id="format-json" class="secondary">格式化JSON</button>
  </div>
  
  <!-- 保存和加载Cookie -->
  <div class="input-group">
    <label for="cookie-set-name">Cookie集名称</label>
    <input type="text" id="cookie-set-name" placeholder="输入名称保存当前Cookie集">
  </div>
  
  <div class="button-group">
    <button id="save-cookies">保存Cookie集</button>
    <button id="load-saved-cookies" class="secondary">加载Cookie集</button>
  </div>
  
  <!-- 已保存的Cookie集 -->
  <div class="saved-cookies">
    <div class="saved-cookies-header">
      <label>已保存的Cookie集</label>
      <button id="refresh-saved-cookies" class="secondary">刷新</button>
    </div>
    <div id="saved-cookies-list" class="saved-cookies-list">
      <!-- 已保存的Cookie集将在这里显示 -->
    </div>
  </div>
  
  <!-- 消息提示区域 -->
  <div id="message" class="message"></div>
  
  <script src="popup.js"></script>
</body>
</html>
